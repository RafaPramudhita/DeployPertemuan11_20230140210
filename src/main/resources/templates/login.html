<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Pertemuan 11</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 flex items-center justify-center min-h-screen font-sans">

<div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md border border-slate-100">
    <div class="text-center mb-8">
        <h1 class="text-3xl font-bold text-slate-800">Selamat Datang</h1>
        <p class="text-slate-400 mt-2 text-sm">Silakan masuk menggunakan akun Anda</p>
    </div>

    <div th:if="${param.error}" class="mb-5 p-4 bg-red-50 border-l-4 border-red-500 rounded-r-xl">
        <p class="text-sm text-red-700 font-medium">Username atau password salah!</p>
    </div>

    <form th:action="@{/login}" method="post" class="space-y-5">
        <div>
            <label class="block text-sm font-semibold text-slate-600 mb-2">Username</label>
            <input type="text" name="username" placeholder="Masukkan username" required
                   class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-all text-slate-700">
        </div>

        <div>
            <label class="block text-sm font-semibold text-slate-600 mb-2">Password</label>
            <input type="password" name="password" placeholder="••••••••" required
                   class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-all text-slate-700">
        </div>

        <button type="submit"
                class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-3 px-4 rounded-xl shadow-lg shadow-indigo-100 hover:shadow-none transition-all duration-200 mt-2">
            Masuk Sekarang
        </button>
    </form>

    <div class="text-center mt-8 pt-6 border-t border-slate-100">
        <p class="text-sm text-slate-500">
            Belum punya akun?
            <a th:href="@{/register}" class="text-indigo-600 hover:text-indigo-700 font-semibold transition-all">Daftar di sini</a>
        </p>
    </div>
</div>

</body>
</html>
