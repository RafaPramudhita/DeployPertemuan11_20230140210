<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Home</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 font-sans min-h-screen">

<nav class="bg-white shadow-sm border-b border-slate-200 sticky top-0 z-50">
    <div class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex justify-between h-16">
            <div class="flex items-center">
                <span class="text-xl font-bold text-indigo-600 tracking-wider">PRAKTIKUM DEPLOY</span>
            </div>
            <div class="flex items-center">
                <a th:href="@{/logout}"
                   class="bg-red-50 text-red-600 hover:bg-red-100 font-semibold px-4 py-2 rounded-xl text-sm transition-all duration-200">
                    Keluar / Logout
                </a>
            </div>
        </div>
    </div>
</nav>

<main class="max-w-3xl mx-auto px-4 py-12">
    <div class="bg-white rounded-2xl shadow-xl border border-slate-100 overflow-hidden">
        <div class="bg-gradient-to-r align-middle from-indigo-600 to-indigo-700 p-8 text-white">
            <div class="flex items-center space-x-4">
                <div class="w-16 h-16 bg-white/20 rounded-full flex items-center justify-center text-2xl font-bold text-white border border-white/10 uppercase">
                    <span th:text="${#strings.substring(profile.name,0,1)}">U</span>
                </div>
                <div>
                    <h2 class="text-2xl font-bold" th:text="${profile.name}">Nama User</h2>
                    <p class="text-indigo-100 text-sm mt-1">Status Keanggotaan: <span class="bg-white/20 text-xs px-2 py-0.5 rounded-full font-semibold uppercase tracking-wide">User Active</span></p>
                </div>
            </div>
        </div>

        <div class="p-8">
            <h3 class="text-lg font-bold text-slate-800 mb-6 pb-2 border-b border-slate-100">Informasi Profil Detail</h3>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="bg-slate-50 p-4 rounded-xl border border-slate-100">
                    <p class="text-xs font-semibold text-slate-400 uppercase tracking-wider">Username Pengguna</p>
                    <p class="text-lg font-bold text-slate-700 mt-1" th:text="${user.username}">username_aktif</p>
                </div>

                <div class="bg-slate-50 p-4 rounded-xl border border-slate-100">
                    <p class="text-xs font-semibold text-slate-400 uppercase tracking-wider">Nama Lengkap</p>
                    <p class="text-lg font-bold text-slate-700 mt-1" th:text="${profile.name}">Nama Lengkap</p>
                </div>

                <div class="bg-slate-50 p-4 rounded-xl border border-slate-100 md:col-span-2">
                    <p class="text-xs font-semibold text-slate-400 uppercase tracking-wider">Alamat Domisili</p>
                    <p class="text-lg font-bold text-slate-700 mt-1" th:text="${profile.alamat}">Alamat Rumah Lengkap</p>
                </div>
            </div>
        </div>
    </div>
</main>

</body>
</html>
