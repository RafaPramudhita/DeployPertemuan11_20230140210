<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register Akun baru</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 flex items-center justify-center min-h-screen font-sans py-10">

<div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md border border-slate-100">
    <div class="text-center mb-8">
        <h1 class="text-3xl font-bold text-slate-800">Buat Akun</h1>
        <p class="text-slate-400 mt-2 text-sm">Lengkapi data di bawah untuk mendaftar</p>
    </div>

    <form th:action="@{/register}" method="post" th:object="${request}" class="space-y-5">
        <div>
            <label class="block text-sm font-semibold text-slate-600 mb-2">Username</label>
            <input type="text" th:field="*{username}" placeholder="Buat username unik" required
                   class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-all text-slate-700">
        </div>

        <div>
            <label class="block text-sm font-semibold text-slate-600 mb-2">Password</label>
            <input type="password" th:field="*{password}" placeholder="Buat password aman" required
                   class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-all text-slate-700">
        </div>

        <div>
            <label class="block text-sm font-semibold text-slate-600 mb-2">Nama Lengkap</label>
            <input type="text" th:field="*{name}" placeholder="Nama lengkap Anda" required
                   class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-all text-slate-700">
        </div>

        <div>
            <label class="block text-sm font-semibold text-slate-600 mb-2">Alamat</label>
            <input type="text" th:field="*{alamat}" placeholder="Kota asal atau domisili" required
                   class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-all text-slate-700">
        </div>

        <button type="submit"
                class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-semibold py-3 px-4 rounded-xl shadow-lg shadow-emerald-100 hover:shadow-none transition-all duration-200 mt-2">
            Daftar Akun Baru
        </button>
    </form>

    <div class="text-center mt-8 pt-6 border-t border-slate-100">
        <p class="text-sm text-slate-500">
            Sudah punya akun?
            <a th:href="@{/login}" class="text-emerald-600 hover:text-emerald-700 font-semibold transition-all">Login disini</a>
        </p>
    </div>
</div>

</body>
</html>
